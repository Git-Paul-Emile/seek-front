name: Deploy Check & Auto-Rollback — Frontend

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Vérification du frontend (Vercel)
  # ─────────────────────────────────────────────
  check-frontend:
    name: Vercel — Deploy Check
    runs-on: ubuntu-latest

    steps:
      - name: Attendre le démarrage du déploiement Vercel
        run: sleep 30

      - name: Surveiller le déploiement Vercel
        id: vercel_check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          MAX_WAIT=600
          INTERVAL=20
          ELAPSED=0

          TEAM_PARAM=""
          [ -n "$VERCEL_TEAM_ID" ] && TEAM_PARAM="&teamId=$VERCEL_TEAM_ID"

          echo "Surveillance du déploiement Vercel..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=5$TEAM_PARAM")

            STATE=$(echo "$RESPONSE"     | jq -r '.deployments[0].state // empty')
            LATEST_ID=$(echo "$RESPONSE" | jq -r '.deployments[0].uid // empty')
            PREV_ID=$(echo "$RESPONSE"   | jq -r '.deployments[1].uid // empty')

            echo "State Vercel: $STATE (${ELAPSED}s écoulées)"

            case "$STATE" in
              BUILDING|QUEUED|INITIALIZING)
                ;;
              READY)
                echo "deployment_id=$LATEST_ID" >> "$GITHUB_OUTPUT"
                echo "prev_deployment_id=$PREV_ID" >> "$GITHUB_OUTPUT"
                echo "status=success" >> "$GITHUB_OUTPUT"
                echo "Déploiement Vercel réussi."
                exit 0
                ;;
              ERROR|CANCELED)
                echo "deployment_id=$LATEST_ID" >> "$GITHUB_OUTPUT"
                echo "prev_deployment_id=$PREV_ID" >> "$GITHUB_OUTPUT"
                echo "status=failed" >> "$GITHUB_OUTPUT"
                echo "error=Build Vercel échoué (state: $STATE)" >> "$GITHUB_OUTPUT"
                exit 1
                ;;
            esac

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "error=Timeout : déploiement Vercel > 10 minutes" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Vérifier l'accessibilité du frontend
        id: frontend_check
        run: |
          echo "Vérification du frontend..."
          sleep 5

          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.FRONTEND_URL }}" 2>/dev/null || echo "000")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "error=Frontend inaccessible (HTTP $HTTP_CODE)" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Frontend OK (HTTP $HTTP_CODE)"

      - name: Rollback Vercel (déploiement précédent)
        if: failure()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          PREV_ID: ${{ steps.vercel_check.outputs.prev_deployment_id }}
        run: |
          if [ -z "$PREV_ID" ]; then
            echo "Aucun déploiement précédent Vercel disponible."
            exit 0
          fi

          TEAM_PARAM=""
          [ -n "$VERCEL_TEAM_ID" ] && TEAM_PARAM="?teamId=$VERCEL_TEAM_ID"

          echo "Rollback Vercel vers : $PREV_ID"
          curl -sf -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/promote/$PREV_ID$TEAM_PARAM"

          echo "Rollback Vercel déclenché."

  # ─────────────────────────────────────────────
  # JOB 2 — Notification email si échec
  # ─────────────────────────────────────────────
  notify-failure:
    name: Notification — Échec Frontend
    needs: check-frontend
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Envoyer l'email d'alerte
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[SEEK FRONT] Déploiement échoué — Rollback déclenché"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Seek Deploy <${{ secrets.GMAIL_USER }}>"
          body: |
            Un problème a été détecté sur le frontend après le dernier push.
            Un rollback automatique vers le déploiement précédent a été déclenché.

            ─────────────────────────────────
            Projet  : SEEK — Frontend (Vercel)
            Branche : main
            Commit  : ${{ github.sha }}
            Auteur  : ${{ github.actor }}
            Message : ${{ github.event.head_commit.message }}
            Date    : ${{ github.event.head_commit.timestamp }}
            ─────────────────────────────────

            Logs GitHub Actions :
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
